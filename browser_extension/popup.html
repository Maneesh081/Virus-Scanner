<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Virus Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #1a1a1a;
            --card: #222;
            --border: #333;
            --red: #e63946;
            --blue: #457b9d;
            --text: #e0e0e0;
            --dim: #777;
        }
        
        body {
            width: 300px;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
        }
        
        .container { padding: 12px; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .logo {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .logo .r { color: var(--red); }
        .logo .b { color: var(--blue); }
        
        .ver { font-size: 10px; color: var(--dim); }
        
        .stats {
            display: flex;
            background: var(--card);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        
        .stat { flex: 1; text-align: center; }
        
        .stat:not(:last-child) { border-right: 1px solid var(--border); }
        
        .stat .num { font-size: 20px; font-weight: 700; }
        
        .stat .lbl {
            font-size: 9px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat.total .num { color: var(--text); }
        .stat.safe .num { color: var(--blue); }
        .stat.danger .num { color: var(--red); }
        
        .btns { display: flex; gap: 8px; margin-bottom: 12px; }
        
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn:active { opacity: 0.8; }
        .btn:disabled { opacity: 0.5; }
        
        .btn.blue { background: var(--blue); color: #fff; }
        .btn.grey { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        
        .section-title {
            font-size: 10px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .section-title span:last-child {
            cursor: pointer;
            color: var(--blue);
        }
        
        .history { max-height: 180px; overflow-y: auto; }
        
        .item {
            background: var(--card);
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            border-left: 3px solid var(--border);
        }
        
        .item.safe { border-left-color: var(--blue); }
        .item.danger { border-left-color: var(--red); }
        
        .item .name {
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .item .info {
            font-size: 10px;
            color: var(--dim);
            margin-top: 3px;
            display: flex;
            justify-content: space-between;
        }
        
        .empty {
            text-align: center;
            padding: 24px;
            color: var(--dim);
            font-size: 11px;
        }
        
        .history::-webkit-scrollbar { width: 3px; }
        .history::-webkit-scrollbar-track { background: transparent; }
        .history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><span class="r">V</span>irus <span class="b">S</span>canner</div>
            <span class="ver">v1.0</span>
        </div>
        
        <div class="stats">
            <div class="stat total">
                <div class="num" id="totalCount">0</div>
                <div class="lbl">Scanned</div>
            </div>
            <div class="stat safe">
                <div class="num" id="cleanCount">0</div>
                <div class="lbl">Clean</div>
            </div>
            <div class="stat danger">
                <div class="num" id="threatCount">0</div>
                <div class="lbl">Threats</div>
            </div>
        </div>
        
        <div class="btns">
            <button class="btn blue" id="quickScan">Quick Scan</button>
            <button class="btn grey" id="scanAll">Scan All</button>
        </div>
        
        <div class="section-title">
            <span>History</span>
            <span id="clearHistory">Clear</span>
        </div>
        
        <div class="history" id="historyList">
            <div class="empty">No files scanned</div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
