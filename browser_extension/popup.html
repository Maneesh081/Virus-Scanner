<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Virus Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #1a1a1a;
            --card: #242424;
            --border: #333;
            --text: #b0b0b0;
            --text-dim: #666;
            --accent: #666;
            --safe: #4CAF50;
            --warning: #FF9800;
            --danger: #f44336;
        }
        
        body {
            width: 320px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 11px;
        }
        
        .terminal {
            padding: 8px;
        }
        
        .header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        
        .header-title {
            color: var(--text);
            font-size: 12px;
            font-weight: bold;
        }
        
        .header-title span {
            color: var(--text-dim);
        }
        
        .stats {
            display: flex;
            margin-bottom: 8px;
            padding: 8px;
            background: var(--card);
            border: 1px solid var(--border);
        }
        
        .stat {
            flex: 1;
            text-align: center;
        }
        
        .stat:not(:last-child) {
            border-right: 1px solid var(--border);
        }
        
        .stat .value {
            font-size: 16px;
            font-weight: bold;
            color: var(--text);
        }
        
        .stat .label {
            font-size: 8px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 2px;
        }
        
        .buttons {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }
        
        .btn {
            flex: 1;
            padding: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
        }
        
        .btn:hover {
            background: var(--border);
        }
        
        .btn:disabled {
            color: var(--text-dim);
        }
        
        .history {
            border-top: 1px solid var(--border);
            padding-top: 8px;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .history-header span:last-child {
            cursor: pointer;
        }
        
        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 6px 8px;
            background: var(--card);
            border: 1px solid var(--border);
            margin-bottom: 4px;
            font-size: 10px;
        }
        
        .history-item.safe { border-left: 2px solid var(--safe); }
        .history-item.warning { border-left: 2px solid var(--warning); }
        .history-item.danger { border-left: 2px solid var(--danger); }
        
        .history-item .filename {
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .history-item .meta {
            color: var(--text-dim);
            font-size: 9px;
            margin-top: 2px;
            display: flex;
            justify-content: space-between;
        }
        
        .empty {
            text-align: center;
            padding: 20px;
            color: var(--text-dim);
            font-size: 10px;
        }
        
        .footer {
            border-top: 1px solid var(--border);
            padding: 6px 8px;
            font-size: 8px;
            color: var(--text-dim);
            text-align: center;
        }
        
        .cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: var(--text);
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <div class="header-title">> virus_scanner <span>v1.0</span></div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="value" id="totalCount">0</div>
                <div class="label">Scanned</div>
            </div>
            <div class="stat">
                <div class="value" id="cleanCount">0</div>
                <div class="label">Clean</div>
            </div>
            <div class="stat">
                <div class="value" id="threatCount">0</div>
                <div class="label">Threats</div>
            </div>
        </div>
        
        <div class="buttons">
            <button class="btn" id="quickScan">scan --latest</button>
            <button class="btn" id="scanAll">scan --all</button>
        </div>
        
        <div class="history">
            <div class="history-header">
                <span>History</span>
                <span id="clearHistory">clear</span>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
        
        <div class="footer">
            > ready <span class="cursor"></span>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
