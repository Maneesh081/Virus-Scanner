<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>winters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0b0d14;
      --surface: #0f1220;
      --border:  #1a1f33;
      --blue:    #4d8ef0;
      --red:     #f04d4d;
      --amber:   #e8a93a;
      --dim:     #3a4260;
      --mid:     #5a6480;
      --muted:   #8892aa;
      --text:    #c8d4e8;
    }

    body {
      width: 420px;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      overflow: hidden;
    }



    /* ── main body ── */
    .term {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── boot lines ── */
    .boot {
      color: var(--dim);
      font-size: 10px;
      margin-bottom: 10px;
      line-height: 1.8;
    }
    .boot .hi { color: var(--mid); }

    /* ── section divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 0;
    }

    /* ── status block ── */
    .status-block { margin-bottom: 2px; }
    .status-row {
      display: flex;
      gap: 0;
      font-size: 11px;
      line-height: 2;
    }
    .status-key { color: var(--muted); width: 100px; flex-shrink: 0; }
    .status-val { color: var(--text); }
    .status-val.blue  { color: var(--blue); }
    .status-val.red   { color: var(--red); }
    .status-val.amber { color: var(--amber); }

    /* ── scan block ── */
    .scan-block { margin: 2px 0; }
    .prompt-line {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      line-height: 2;
    }
    .prompt-sym { color: var(--blue); }
    .prompt-cmd { color: var(--text); }
    .run-link {
      color: var(--blue);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-size: 10px;
      margin-left: auto;
    }
    .run-link:hover { color: #7aaeff; }

    /* progress bar */
    .progress-wrap {
      display: none;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }
    .progress-wrap.active { display: block; }
    .bar-filled { color: var(--blue); }
    .bar-empty  { color: var(--dim); }
    .bar-pct    { color: var(--text); margin-left: 6px; }

    /* ── history block ── */
    .history-block { margin-top: 2px; }
    .section-label {
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-label .clr {
      color: var(--mid);
      cursor: pointer;
      font-size: 10px;
    }
    .section-label .clr:hover { color: var(--text); }

    .history-list {
      max-height: 190px;
      overflow-y: auto;
    }
    .history-list::-webkit-scrollbar { width: 2px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); }

    .h-row {
      font-size: 11px;
      line-height: 1.9;
      cursor: pointer;
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 0 2px;
      border-radius: 2px;
    }
    .h-row:hover { background: #111624; }

    .h-time  { color: var(--dim); font-size: 10px; flex-shrink: 0; width: 52px; }
    .h-name  { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      padding: 1px 4px;
    }
    .tag.ok     { color: var(--blue); }
    .tag.threat { color: var(--red); }
    .tag.warn   { color: var(--amber); }

    /* expanded detail */
    .h-detail {
      display: none;
      border-left: 2px solid var(--border);
      margin: 2px 0 4px 58px;
      padding-left: 10px;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.9;
    }
    .h-row.open + .h-detail { display: block; }
    .h-detail .tree-line { color: var(--mid); }
    .h-detail .tree-line span { color: var(--text); }
    .h-detail .tree-line.threat-name span { color: var(--red); }

    .empty-msg {
      color: var(--dim);
      font-size: 11px;
      padding: 6px 0;
    }

    /* ── command input ── */
    .cmd-block {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .cmd-prompt { color: var(--blue); flex-shrink: 0; }
    .cmd-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      flex: 1;
      caret-color: var(--blue);
    }
    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--blue);
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

  <!-- terminal body -->
  <div class="term">

    <!-- boot lines -->
    <div class="boot">
      <div>winters v1.0.0 — malware scanner engine</div>
     
    </div>

    <hr class="divider">

    <!-- status -->
    <div class="status-block">
      <div class="status-row">
        <span class="status-key">scanned</span>
        <span class="status-val" id="statTotal">0</span>
      </div>
      <div class="status-row">
        <span class="status-key">clean</span>
        <span class="status-val blue" id="statClean">0</span>
      </div>
      <div class="status-row">
        <span class="status-key">threats</span>
        <span class="status-val red" id="statThreats">0</span>
      </div>
    </div>

    <hr class="divider">

    <!-- scan -->
    <div class="scan-block">
      <div class="prompt-line">
        <span class="prompt-sym">❯</span>
        <span class="prompt-cmd">winters scan --watch /Downloads</span>
        <span class="run-link" id="runScan">run scan</span>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <span id="barFilled" class="bar-filled"></span><span id="barEmpty" class="bar-empty"></span><span class="bar-pct" id="barPct">0%</span>
      </div>
    </div>

    <hr class="divider">

    <!-- history -->
    <div class="history-block">
      <div class="section-label">
        <span>winters history</span>
        <span class="clr" id="clearHistory">clear</span>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-msg">no files scanned yet</div>
      </div>
    </div>

    <!-- command input -->
    <div class="cmd-block">
      <span class="cmd-prompt">❯</span>
      <input class="cmd-input" id="cmdInput" type="text" placeholder="scan · help · clear" autocomplete="off" spellcheck="false">
      <span class="cursor"></span>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
