<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Virus Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 320px;
            min-height: 400px;
            background: linear-gradient(180deg, #0a0a0a 0%, #141414 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', -apple-system, sans-serif;
        }
        
        .header {
            padding: 14px 16px;
            background: linear-gradient(135deg, #1a1a1a, #1e1e1e);
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header h1 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #fff;
        }
        
        .header .badge {
            font-size: 9px;
            padding: 3px 8px;
            background: #252525;
            border-radius: 3px;
            color: #666;
            border: 1px solid #333;
        }
        
        .stats {
            display: flex;
            background: #0f0f0f;
            border-bottom: 1px solid #1a1a1a;
        }
        
        .stat {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            border-right: 1px solid #1a1a1a;
        }
        
        .stat:last-child { border-right: none; }
        
        .stat .value {
            font-size: 22px;
            font-weight: 600;
            font-family: 'Consolas', monospace;
        }
        
        .stat .label {
            font-size: 9px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        
        .stat.safe .value { color: #4ade80; }
        .stat.danger .value { color: #f87171; }
        .stat.total .value { color: #60a5fa; }
        
        .content { padding: 14px; }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e1e1e, #181818);
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            color: #ccc;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 8px;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #252525, #1e1e1e);
            border-color: #3a3a3a;
            color: #fff;
        }
        
        .btn:active { transform: scale(0.99); }
        
        .btn.primary {
            background: linear-gradient(135deg, #2a2a2a, #1e1e1e);
            border-color: #404040;
        }
        
        .btn.primary:hover {
            background: linear-gradient(135deg, #3a3a3a, #2a2a2a);
        }
        
        .history {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #1a1a1a;
        }
        
        .history-title {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .history-title span:last-child {
            cursor: pointer;
            color: #666;
        }
        
        .history-title span:last-child:hover { color: #888; }
        
        .history-list { max-height: 140px; overflow-y: auto; }
        
        .history-item {
            padding: 8px 10px;
            background: #0f0f0f;
            border-radius: 3px;
            margin-bottom: 4px;
            border-left: 2px solid #2a2a2a;
        }
        
        .history-item.clean { border-left-color: #4ade80; }
        .history-item.danger { border-left-color: #f87171; }
        
        .history-item .filename {
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #bbb;
        }
        
        .history-item .explanation {
            font-size: 9px;
            color: #888;
            margin-top: 3px;
            line-height: 14px;
        }
        
        .safety-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 8px;
            font-weight: 600;
            margin-right: 4px;
            text-transform: uppercase;
        }
        
        .safety-badge.clean {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
        }
        
        .safety-badge.warning {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }
        
        .safety-badge.danger {
            background: rgba(248, 113, 113, 0.15);
            color: #f87171;
        }
        
        .history-item.clean .safety-badge.clean {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }
        
        .history-item.warning .safety-badge.warning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        
        .history-item.danger .safety-badge.danger {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }
        
        .history-item .meta {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            font-size: 9px;
            color: #555;
        }
        
        .history-item .status {
            padding: 1px 4px;
            border-radius: 2px;
            font-size: 8px;
            text-transform: uppercase;
        }
        
        .history-item .status.clean { background: rgba(74, 222, 128, 0.1); color: #4ade80; }
        .history-item .status.danger { background: rgba(248, 113, 113, 0.1); color: #f87171; }
        
        .settings {
            padding: 10px 14px;
            border-top: 1px solid #1a1a1a;
            margin-top: 10px;
        }
        
        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }
        
        .setting-label { font-size: 11px; color: #666; }
        
        .toggle {
            width: 32px;
            height: 18px;
            background: #252525;
            border-radius: 9px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .toggle.active { background: #404040; }
        
        .toggle::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #888;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.2s;
        }
        
        .toggle.active::after {
            left: 16px;
            background: #fff;
        }
        
        .footer {
            padding: 8px 14px;
            text-align: center;
            font-size: 9px;
            color: #333;
        }
        
        .history-list::-webkit-scrollbar { width: 3px; }
        .history-list::-webkit-scrollbar-track { background: #0a0a0a; }
        .history-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Virus Scanner</h1>
        <span class="badge">SCANNER</span>
    </div>
    
    <div class="stats">
        <div class="stat total">
            <div class="value" id="totalCount">0</div>
            <div class="label">Scanned</div>
        </div>
        <div class="stat safe">
            <div class="value" id="cleanCount">0</div>
            <div class="label">Clean</div>
        </div>
        <div class="stat danger">
            <div class="value" id="threatCount">0</div>
            <div class="label">Threats</div>
        </div>
    </div>
    
    <div class="content">
        <button class="btn primary" id="quickScan">Quick Scan</button>
        <button class="btn" id="scanAll">Scan All Downloads</button>
        
        <div class="history">
            <div class="history-title">
                <span>Recent</span>
                <span id="clearHistory">Clear</span>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>
    
    <div class="settings">
        <div class="setting">
            <span class="setting-label">Auto-scan</span>
            <div class="toggle active" id="autoScan"></div>
        </div>
        <div class="setting">
            <span class="setting-label">Notifications</span>
            <div class="toggle active" id="notifications"></div>
        </div>
    </div>
    
    <div class="footer">v1.0</div>
    
    <script src="popup.js"></script>
</body>
</html>
